    // Helper to generate precise card layouts matching your screenshot architecture
    function createMenuCard(item) {
        const dotClass = item.tag === 'veg' ? 'food-tag-veg' : 'food-tag-nonveg';
        return `
            <div class="glass-glow-red p-4 rounded-2xl border border-white/5 bg-surface-container/20 flex justify-between items-center transition-all duration-300 gap-4">
                <div class="space-y-1.5 flex-1">
                    <div class="${dotClass} w-3 h-3 rounded-sm bg-transparent flex items-center justify-center"></div>
                    <h4 class="font-display-lg text-base md:text-lg text-white font-bold tracking-tight">${item.name}</h4>
                    <p class="text-sm font-label-caps text-secondary font-semibold">₹${item.price}</p>
                    <p class="text-xs text-on-surface-variant opacity-60 leading-relaxed max-w-sm line-clamp-2">${item.desc}</p>
                </div>
                <div class="flex flex-col items-center gap-2 flex-shrink-0 relative">
                    <img class="w-24 h-24 rounded-xl object-cover border border-white/10 shadow-md shadow-black/60" src="${item.img}" alt="${item.name}">
                    <button class="absolute -bottom-2 bg-background border border-primary-container/40 hover:border-primary-container text-primary-container hover:bg-primary-container hover:text-on-primary-container text-[10px] font-label-caps font-bold px-4 py-1.5 rounded-lg shadow-lg tracking-widest transition-all duration-300 transform active:scale-95">
                        ADD +
                    </button>
                </div>
            </div>
        `;
    }

    // Load and populate arrays into appropriate view structures
    function loadMenu() {
        document.getElementById('veg-menu-container').innerHTML = menuData.veg.map(createMenuCard).join('');
        document.getElementById('nonveg-menu-container').innerHTML = menuData.nonveg.map(createMenuCard).join('');
        document.getElementById('snacks-menu-container').innerHTML = menuData.snacks.map(createMenuCard).join('');
    }

    // Tab switcher filtering system linked directly to slider movements
    function switchCategory(category) {
        // Toggle Active Tabs in Slider
        const tabs = document.querySelectorAll('.category-tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        
        const activeEventIndex = { 'all':0, 'veg':1, 'nonveg':2, 'snacks':3 }[category];
        tabs[activeEventIndex].classList.add('active');

        // Scroll category slider to center selected button smoothly
        tabs[activeEventIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

        // Toggle UI Section Views
        const sections = document.querySelectorAll('.menu-section-wrapper');
        sections.forEach(sec => {
            if (category === 'all' || sec.getAttribute('data-category') === category) {
                sec.style.display = 'block';
            } else {
                sec.style.display = 'none';
            }
        });
    }

    // Instantiate layout engine initialization on document load
    window.onload = function() {
        loadMenu();
        
        // Check if the user came from a specific category on the index page
        const targetCat = localStorage.getItem('targetCategory');
        if (targetCat) {
            // Switch to that category automatically
            switchCategory(targetCat);
            // Clear the memory so it doesn't stay locked next time they visit
            localStorage.removeItem('targetCategory');
        }
    };
</script>
